<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Seekee Music · Mood Match</title>
<style>
/* ============ LatAm "Energetic Utility":单一高饱和品牌色 + 浅暖底 + 圆润大字 ============ */
:root{
  --brand:#FF4D2E;         /* 珊瑚红:唯一强品牌色,大面积重复使用 */
  --brand-deep:#E23A1B;
  --brand-soft:#FFE9E2;
  --sun:#FFB800;           /* 辅助:仅用于 GRATIS/高亮标签 */
  --ink:#231A20;           /* 近黑暖色文字 */
  --sub:#8A7B74;
  --bg:#FFF7F0;            /* 浅暖背景 */
  --card:#FFFFFF;
  --line:#F3E6DC;
  --ok:#12A150;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  min-height:100vh;display:flex;justify-content:center}
#app{width:100%;max-width:440px;min-height:100vh;padding:18px 18px 120px;position:relative}
.brand{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.logo{width:30px;height:30px;border-radius:10px;background:var(--brand);display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 3px 10px rgba(255,77,46,.3)}
.brand b{font-size:15px;font-weight:900;letter-spacing:.2px}
.langs{margin-left:auto;display:flex;gap:2px;background:#fff;border:1.5px solid var(--line);border-radius:22px;padding:3px}
.langs button{border:0;background:none;color:var(--sub);font-size:11px;font-weight:800;padding:5px 10px;border-radius:18px;cursor:pointer}
.langs button.on{background:var(--brand);color:#fff}
.screen{display:none;animation:fade .3s ease}
.screen.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
/* landing */
.hero{margin-top:18px;text-align:center}
.hero .eq{display:flex;gap:5px;justify-content:center;height:32px;align-items:flex-end;margin-bottom:14px}
.hero .eq i{width:8px;border-radius:4px;background:var(--brand);animation:eq 1s ease-in-out infinite}
.hero .eq i:nth-child(2n){background:var(--sun)}
@keyframes eq{0%,100%{height:9px}50%{height:30px}}
.hero h1{font-size:30px;line-height:1.15;font-weight:900;letter-spacing:-.5px}
.hero h1 em{font-style:normal;color:var(--brand)}
.hero p{color:var(--sub);font-size:14.5px;font-weight:600;margin:10px 0 18px;line-height:1.55}
.cta{display:block;width:100%;border:0;border-radius:20px;background:var(--brand);color:#fff;font-size:18px;font-weight:900;padding:17px;cursor:pointer;box-shadow:0 10px 24px rgba(255,77,46,.35);transition:.12s}
.cta:active{transform:scale(.97)}
.stats{display:flex;gap:8px;margin-top:14px}
.stats>div{flex:1;background:#fff;border:1.5px solid var(--line);border-radius:16px;padding:10px 4px;text-align:center}
.stats b{display:block;font-size:19px;font-weight:900;color:var(--brand)}
.stats span{font-size:10.5px;color:var(--sub);font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.sect{font-size:13px;color:var(--ink);margin:26px 0 10px;font-weight:900;letter-spacing:.6px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{border:0;border-radius:24px;padding:11px 15px;font-size:14px;cursor:pointer;color:var(--ink);font-weight:800;box-shadow:0 2px 6px rgba(35,26,32,.06);transition:.12s}
.chip:active{transform:scale(.94)}
.chip.big{background:var(--brand);color:#fff;box-shadow:0 6px 16px rgba(255,77,46,.3)}
.trends{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;margin:0 -18px;padding-left:18px;padding-right:18px}
.trends::-webkit-scrollbar{display:none}
.tcard{flex:0 0 150px;background:#fff;border:1.5px solid var(--line);border-radius:18px;overflow:hidden;cursor:pointer;transition:.12s}
.tcard:active{transform:scale(.96)}
.tc-cover{height:84px;display:flex;align-items:center;justify-content:center;font-size:32px;position:relative}
.free-badge{position:absolute;left:8px;top:8px;background:var(--sun);color:var(--ink);font-size:9.5px;font-weight:900;border-radius:12px;padding:2px 8px;letter-spacing:.4px}
.tc-body{padding:9px 11px}
.tc-t{font-size:13px;font-weight:800;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tc-s{font-size:10.5px;color:var(--sub);font-weight:700;margin-top:3px}
/* steps */
.stephead{display:flex;align-items:center;gap:10px;margin:16px 0 4px}
.back{width:36px;height:36px;border-radius:14px;border:1.5px solid var(--line);background:#fff;color:var(--ink);font-size:17px;font-weight:800;cursor:pointer}
.dots{margin-left:auto;display:flex;gap:5px}
.dots i{width:20px;height:5px;border-radius:3px;background:var(--line)}
.dots i.done{background:var(--brand)}
.q{font-size:24px;font-weight:900;margin:16px 0 2px;letter-spacing:-.3px}
.qsub{color:var(--sub);font-size:13px;font-weight:700;margin-bottom:16px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt{border:0;border-radius:20px;padding:15px 13px;cursor:pointer;transition:.12s;text-align:left;box-shadow:0 2px 8px rgba(35,26,32,.05)}
.opt:active{transform:scale(.95)}
.opt .ic{font-size:26px}
.opt .en{display:block;font-size:15px;font-weight:900;margin-top:7px;color:var(--ink)}
.opt .zh{display:block;font-size:11.5px;color:rgba(35,26,32,.55);font-weight:700;margin-top:2px}
.skip{display:block;margin:18px auto 0;background:#fff;border:1.5px solid var(--line);border-radius:20px;color:var(--sub);font-size:14px;font-weight:800;padding:10px 22px;cursor:pointer}
/* result */
.lvl{display:inline-block;font-size:11px;color:var(--ok);background:#E7F6EC;border-radius:20px;padding:4px 11px;margin-bottom:10px;font-weight:900}
.combo{font-size:13px;color:var(--sub);font-weight:700;margin-bottom:12px;line-height:1.6}
.combo b{color:var(--ink)}
.pcard{background:#fff;border:1.5px solid var(--line);border-radius:24px;overflow:hidden;margin-bottom:14px;box-shadow:0 8px 24px rgba(35,26,32,.07)}
.cover-big{position:relative;width:100%;aspect-ratio:16/8;display:flex;align-items:center;justify-content:center;cursor:pointer}
.cover-big .big-ic{font-size:56px;filter:drop-shadow(0 6px 14px rgba(0,0,0,.25))}
.cover-big .pl-badge{position:absolute;right:12px;bottom:10px;background:rgba(0,0,0,.5);color:#fff;border-radius:20px;padding:5px 13px;font-size:12px;font-weight:800}
/* 真实封面加载成功后:背景图覆盖,隐藏占位 emoji */
.cover-img{background-size:cover!important;background-position:center!important}
.cover-img .big-ic,.cover-img .tc-ic,.cover-img .alt-ic{opacity:0}
.pbody{padding:16px}
.pbody h2{font-size:20px;font-weight:900;line-height:1.3;letter-spacing:-.2px}
.pbody .meta{color:var(--brand);font-size:12px;font-weight:800;margin:6px 0 8px}
.pbody .desc{color:var(--sub);font-size:13px;font-weight:600;line-height:1.6;margin-bottom:14px}
.row{display:flex;gap:10px}
.play{flex:1;border:0;border-radius:16px;background:var(--brand);color:#fff;font-size:15.5px;font-weight:900;padding:14px;cursor:pointer;box-shadow:0 6px 16px rgba(255,77,46,.3);transition:.12s}
.play:active{transform:scale(.97)}
.shuf{border:1.5px solid var(--line);border-radius:16px;background:#fff;color:var(--ink);font-size:14px;font-weight:800;padding:14px 16px;cursor:pointer}
.alt-title{font-size:13px;color:var(--ink);font-weight:900;margin:20px 0 10px;letter-spacing:.4px}
.alt{display:flex;gap:12px;align-items:center;background:#fff;border:1.5px solid var(--line);border-radius:18px;padding:11px 13px;margin-bottom:9px;cursor:pointer;transition:.12s}
.alt:active{transform:scale(.97)}
.alt .cover{width:46px;height:46px;border-radius:14px;flex:none;display:flex;align-items:center;justify-content:center;font-size:22px}
.alt .t{font-size:14px;font-weight:800;line-height:1.3}
.alt .s{font-size:11.5px;color:var(--sub);font-weight:700;margin-top:3px}
.alt .go{margin-left:auto;width:34px;height:34px;border-radius:50%;background:var(--brand-soft);color:var(--brand);font-size:14px;display:flex;align-items:center;justify-content:center;font-weight:900}
.restart{display:block;margin:22px auto 0;background:none;border:0;color:var(--sub);font-size:13px;font-weight:800;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
/* admin(内部工具,保持深色) */
.abar{display:flex;align-items:center;gap:10px;margin:18px 0}
.abar h2{font-size:19px;font-weight:900}
.abar .note{font-size:10.5px;color:var(--sub);margin-left:auto;text-align:right;line-height:1.4}
.acard{background:#fff;border:1.5px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px}
.acard h3{font-size:13px;color:var(--sub);margin-bottom:10px;font-weight:800}
.bignum{font-size:34px;font-weight:900;color:var(--brand)}
.astat{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.fcell{background:var(--bg);border:1.5px solid var(--line);border-radius:12px;padding:9px 6px;text-align:center}
.fcell .v{font-size:18px;font-weight:900;color:var(--brand)}
.fcell .k{font-size:9.5px;color:var(--sub);font-weight:700;margin-top:2px}
.fcell .r{font-size:9.5px;color:var(--ok);font-weight:800;margin-top:1px}
.brow{display:flex;align-items:center;gap:8px;font-size:12px;margin:6px 0}
.brow .bl{width:118px;color:var(--sub);font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:none}
.brow .bt{flex:1;height:13px;background:var(--bg);border-radius:7px;overflow:hidden}
.brow .bf{height:100%;background:var(--brand);border-radius:7px;min-width:2px}
.brow .bv{width:30px;text-align:right;flex:none;color:var(--ink);font-weight:800}
.abtn{border:1.5px solid var(--line);background:#fff;color:var(--ink);border-radius:12px;padding:8px 14px;font-size:12.5px;font-weight:800;cursor:pointer;margin:0 8px 0 0}
.evrow{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#7d7068;padding:3px 0;border-bottom:1px dashed var(--line);word-break:break-all}
.evrow b{color:var(--brand)}
.empty{color:var(--sub);font-size:12px}
/* analytics drawer(内部工具) */
#tracker{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:440px;z-index:50}
#tbar{display:flex;align-items:center;gap:8px;background:#231A20;border-top:1px solid #3a2e35;padding:10px 16px;cursor:pointer;font-size:12px;color:#b8a9a1}
#tbar b{color:var(--sun)}
#tbar .n{background:#3a2e35;border-radius:20px;padding:1px 9px}
#tbar .admin-link{margin-left:auto;color:#ffb8a5;border:1px solid #6b4a41;border-radius:20px;padding:2px 10px;font-size:11px}
#tbody{display:none;background:#231A20;max-height:46vh;overflow:auto;padding:12px 16px;border-top:1px solid #3a2e35}
#tracker.open #tbody{display:block}
.funnel{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px}
#tbody .fcell{background:#2e242a;border-color:#3a2e35}
#tbody .fcell .v{color:var(--sun)}
#tbody .fcell .k{color:#b8a9a1}
.logline{font-family:ui-monospace,Menlo,monospace;font-size:10.5px;color:#b8a9a1;padding:3px 0;border-bottom:1px dashed #3a2e35;word-break:break-all}
.logline b{color:var(--sun)}
</style>
</head>
<body>
<div id="app">
  <div class="brand">
    <div class="logo">🎵</div><b>Seekee Music</b>
    <div class="langs">
      <button id="lang-es" onclick="setLang('es')">ES</button>
      <button id="lang-en" onclick="setLang('en')">EN</button>
      <button id="lang-pt" onclick="setLang('pt')">PT</button>
    </div>
  </div>

  <!-- S1 landing:多入口 -->
  <section class="screen on" id="s-landing">
    <div class="hero">
      <div class="eq"><i style="animation-delay:0s"></i><i style="animation-delay:.15s"></i><i style="animation-delay:.3s"></i><i style="animation-delay:.45s"></i><i style="animation-delay:.6s"></i></div>
      <h1 id="t-hero"></h1>
      <p id="t-herosub"></p>
      <button class="cta" id="t-cta" onclick="start()"></button>
      <div class="stats">
        <div><b>600+</b><span>playlists</span></div>
        <div><b id="t-stat-free-v"></b><span id="t-stat-free"></span></div>
        <div><b>30s</b><span id="t-stat-fast"></span></div>
      </div>
    </div>
    <div class="sect" id="t-sect-quick"></div>
    <div class="chips" id="quick-chips"></div>
    <div class="sect" id="t-sect-trend"></div>
    <div class="trends" id="trend-row"></div>
    <div class="sect" id="t-sect-idea"></div>
    <div class="chips"><button class="chip big" id="t-surprise" onclick="surprise()"></button></div>
  </section>

  <!-- S2 scene -->
  <section class="screen" id="s-scene">
    <div class="stephead"><button class="back" onclick="go('s-landing')">‹</button><div class="dots"><i class="done"></i><i></i><i></i></div></div>
    <div class="q" id="t-sceneq"></div>
    <div class="qsub" id="t-scenesub"></div>
    <div class="grid" id="scene-grid"></div>
  </section>

  <!-- S3 mood -->
  <section class="screen" id="s-mood">
    <div class="stephead"><button class="back" onclick="go('s-scene')">‹</button><div class="dots"><i class="done"></i><i class="done"></i><i></i></div></div>
    <div class="q" id="mood-q"></div>
    <div class="qsub" id="mood-qsub"></div>
    <div class="grid" id="mood-grid"></div>
  </section>

  <!-- S4 genre -->
  <section class="screen" id="s-genre">
    <div class="stephead"><button class="back" onclick="go('s-mood')">‹</button><div class="dots"><i class="done"></i><i class="done"></i><i class="done"></i></div></div>
    <div class="q" id="t-genreq"></div>
    <div class="qsub" id="t-genresub"></div>
    <div class="grid" id="genre-grid"></div>
    <button class="skip" id="t-skip" onclick="pickGenre(null)"></button>
  </section>

  <!-- S5 result -->
  <section class="screen" id="s-result">
    <div class="stephead"><button class="back" onclick="resultBack()">‹</button><div class="dots"><i class="done"></i><i class="done"></i><i class="done"></i></div></div>
    <div id="result-box"></div>
  </section>

  <!-- S6 admin 后台统计 -->
  <section class="screen" id="s-admin">
    <div class="abar">
      <button class="back" onclick="go('s-landing')">‹</button>
      <h2>📊 数据后台</h2>
      <div class="note">演示版:数据存于本机浏览器<br>正式版对接 GA4 / 服务端上报</div>
    </div>
    <div id="admin-box"></div>
  </section>
</div>

<!-- 埋点抽屉 -->
<div id="tracker">
  <div id="tbar" onclick="document.getElementById('tracker').classList.toggle('open')">
    <b>📊</b> 埋点日志 <span class="n" id="evt-count">0</span>
    <span class="admin-link" onclick="event.stopPropagation();openAdmin()">⚙ 数据后台</span>
  </div>
  <div id="tbody">
    <div class="funnel" id="funnel"></div>
    <div id="loglines"></div>
  </div>
</div>

function track(ev, params={}){

  EVENTS.push(e);

/* ---------- 匹配引擎:标签规则 + 降级 ---------- */
function hay(p){ return (p.s.join('|')+'|'+p.o.join('|')+'|'+p.g.join('|')+'|'+p.t+'|'+p.d+'|'+p.cat).toLowerCase(); }
function rank(sceneKey, moodKey, genreKey){
  const scene = SCENES[sceneKey], mood = MOODSETS[moodKey], genre = genreKey?GENRES[genreKey]:null;
  const scored = [];
  for(const p of DATA){
    const h = hay(p);
    let score = 0, moodHit=false, sceneHit=false;
    const inter = p.m.filter(m=>mood.set.includes(m)).length;
    if(inter>0){ moodHit=true; score += 30 + Math.min(inter-1,3)*4; }
    if(mood.kw && mood.kw.some(k=>h.includes(k))){ moodHit=true; score += mood.set.length?18:45; }
    if(scene.kw.some(k=>h.includes(k))){ sceneHit=true; score += 26; }
    if(genre){
      if(p.g.some(x=>genre.g.includes(x))){ score += 16; }
      else if(genre.g.some(k=>k.length>3 && h.includes(k))){ score += 8; }
    }
    if(p.top) score += 6;
    if(moodHit||sceneHit) scored.push({p, score, lvl: moodHit&&sceneHit ? 1 : moodHit ? 2 : 3});
  }
  scored.sort((a,b)=> a.lvl-b.lvl || b.score-a.score);
  const fallback = DATA.filter(p=>p.top).map(p=>({p, score:1, lvl:4}));
  const ids = new Set(scored.map(x=>x.p.id));
  return scored.concat(fallback.filter(x=>!ids.has(x.p.id)));
}

const PALS = [['#FF4D2E','#FF9A5C'],['#FFB800','#FF7A45'],['#12A150','#7BE495'],['#1E88E5','#6EC6FF'],['#8E24AA','#CE93D8'],['#E91E63','#F48FB1'],['#00897B','#4DB6AC'],['#F4511E','#FFAB91']];
function pal(id){ let h=0; for(const c of id) h=(h*31+c.charCodeAt(0))>>>0; const x=PALS[h%PALS.length]; return `linear-gradient(135deg,${x[0]},${x[1]})`; }
function coverIcon(p, fallbackIc){
  const m = p.t.match(/\p{Extended_Pictographic}/u);
  return m ? m[0] : (fallbackIc||'🎵');
}
/* ---------- 真实歌单封面:oEmbed 异步获取 + localStorage 缓存,失败则保留渐变占位 ---------- */
const THUMBS = (()=>{ try{ return JSON.parse(localStorage.getItem('sk_thumbs')||'{}'); }catch(_){ return {}; } })();
function saveThumb(id,url){ THUMBS[id]=url; try{ localStorage.setItem('sk_thumbs',JSON.stringify(THUMBS)); }catch(_){} }
function applyThumb(el,url){
  const img=new Image();
  img.onload=()=>{ el.style.backgroundImage=`linear-gradient(rgba(0,0,0,.18),rgba(0,0,0,.3)),url('${url}')`; el.classList.add('cover-img'); };
  img.src=url;
}
function hydrateCovers(root){
  if(typeof fetch==='undefined'||!root||!root.querySelectorAll) return;
  root.querySelectorAll('[data-cover]').forEach(el=>{
    const id=el.getAttribute('data-cover');
    if(THUMBS[id]) return applyThumb(el,THUMBS[id]);
    const plUrl = encodeURIComponent('https://www.youtube.com/playlist?list='+id);
    const tryFetch = urls => !urls.length ? null : // 依次尝试,全部失败则保留渐变占位
      fetch(urls[0]).then(r=>r.json()).then(j=>{
        if(j&&j.thumbnail_url){ saveThumb(id,j.thumbnail_url); applyThumb(el,j.thumbnail_url); }
        else tryFetch(urls.slice(1));
      }).catch(()=>tryFetch(urls.slice(1)));
    tryFetch([
      'https://noembed.com/embed?url='+plUrl,
      'https://www.youtube.com/oembed?format=json&url='+plUrl,
    ]);
  });
}

function match(boostKw){

  if(boostKw){
    // 从全量歌单捞取风格关键词命中者置顶(首页展示歌单优先)
    const hitIds = new Set();
    const hits = DATA.filter(p=>hay(p).includes(boostKw))
      .sort((a,b)=>(b.top?1:0)-(a.top?1:0))
      .map(p=>{ hitIds.add(p.id); return {p, score:50, lvl:1}; });
    state.results = hits.concat(state.results.filter(r=>!hitIds.has(r.p.id)));
  }
  state.cursor=0; state.shuffles=0;
  renderResult(); go('s-result');
}

function cnt(evs, name, key){
  const c={};

  return Object.entries(c).sort((a,b)=>b[1]-a[1]);

function bars(pairs, mapLabel){

    <div class="bt"><div class="bf" style="width:${Math.round(v/max*100)}%"></div></div>

}

    <div class="acard"><h3>场景选择分布</h3>${bars(cnt(evs,'scene_select','value'), k=>SCENES[k]?SCENES[k].ic+' '+SCENES[k].en:k)}</div>
    <div class="acard"><h3>心情选择分布</h3>${bars(cnt(evs,'mood_select','value'), k=>MOODSETS[k]?MOODSETS[k].ic+' '+MOODSETS[k].en:k)}</div>
    <div class="acard"><h3>曲风选择分布</h3>${bars(cnt(evs,'genre_select','value'), k=>GENRES[k]?GENRES[k].ic+' '+GENRES[k].en:k)}</div>
    <div class="acard"><h3>匹配层级分布(match_view)</h3>${bars(cnt(evs,'match_view','match_level'))}</div>
    <div class="acard"><h3>播放点击 TOP 歌单</h3>${bars(cnt(evs,'play_click','playlist_id'), k=>TITLE[k]||k)}</div>
    <div class="acard"><h3>渠道来源(utm_source)</h3>${bars(cnt(evs,'page_view','utm_source'))}</div>
    <div class="acard"><h3>操作</h3>
      <button class="abtn" onclick="exportCsv()">⬇ 导出 CSV</button>
      <button class="abtn" onclick="if(confirm('清空本机全部统计数据?')){localStorage.removeItem('sk_events');renderAdmin();}">🗑 清空数据</button>
      <button class="abtn" onclick="renderAdmin()">↻ 刷新</button>
    </div>
    <div class="acard"><h3>事件明细(最近 50 条,共 ${evs.length} 条)</h3>
      ${last.map(e=>{const {ev,sid,t,ts,...rest}=e;return `<div class="evrow"><b>${t||''}</b> [${sid}] ${ev} ${JSON.stringify(rest)}</div>`;}).join('')||'<div class="empty">暂无数据</div>'}
    </div>`;
}
function exportCsv(){
  const evs = allEvents();
  const cols = ['ts','t','sid','ev','value','playlist_id','match_level','slot','combo','entry','utm_source','ui_lang','n','shuffles','lang'];
  const lines = [cols.join(',')].concat(evs.map(e=>cols.map(c=>JSON.stringify(e[c]??'')).join(',')));
  const blob = new Blob(['﻿'+lines.join('\n')], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'seekee_mood_events.csv'; a.click();
}

/* ---------- 启动 ---------- */
applyLang();
track('page_view',{utm_source:new URLSearchParams(location.search).get('utm_source')||'direct', lang:navigator.language,
  quick_shown:QUICK_PICK.map(q=>q.id).join('|'), trend_shown:TREND_PICK.map(p=>p.id).join('|')}); // 记录本次曝光内容,便于分析各入口/歌单的曝光→点击率
if(location.hash==='#admin') openAdmin();
</script>
