<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="description" content="Choose a mood and start a YouTube Music playlist in one tap.">
  <meta property="og:title" content="Seekee Music">
  <meta property="og:description" content="Tu música empieza con un toque">
  <meta property="og:type" content="website">
  <meta property="og:image" content="__SITE_ORIGIN__/og.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="__SITE_ORIGIN__/og.png">
  <title>Music · For this moment</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar" aria-label="Music tab header">
      <h1>Music</h1>
      <div class="topbar-actions" aria-hidden="true">
        <span class="icon-button">⌕</span>
        <span class="avatar">S</span>
      </div>
    </header>

    <main>
      <section class="intent-module" id="intent-module" aria-labelledby="intent-title">
        <p class="eyebrow" id="intent-eyebrow"></p>
        <h2 id="intent-title"></h2>
        <p class="module-subtitle" id="intent-subtitle"></p>
        <div class="intent-grid" id="intent-grid"></div>
        <button class="assistant-entry" id="assistant-entry" type="button">
          <span aria-hidden="true">✦</span>
          <span id="assistant-entry-label"></span>
          <span aria-hidden="true">›</span>
        </button>
      </section>

      <section class="player-section" id="player-section" aria-labelledby="player-heading" hidden>
        <div class="player-heading-row">
          <div>
            <p class="eyebrow" id="player-eyebrow"></p>
            <h2 id="player-heading"></h2>
          </div>
          <span class="source-badge">YouTube</span>
        </div>
        <p class="playback-status" id="playback-status" role="status" aria-live="polite"></p>

        <div class="youtube-player-shell" id="youtube-player-shell">
          <div id="youtube-player"></div>
        </div>

        <div class="now-playing" id="now-playing" hidden>
          <div class="now-playing-copy">
            <span class="playing-dot" aria-hidden="true"></span>
            <div>
              <p id="now-playing-label"></p>
              <strong id="playlist-title"></strong>
            </div>
          </div>
          <div class="refine-chips" id="refine-chips" aria-label="Playback refinements"></div>
        </div>

        <div class="error-actions" id="error-actions" hidden>
          <button class="retry-button" id="retry-button" type="button"></button>
        </div>
      </section>

      <section class="browse-section" aria-labelledby="browse-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow" id="browse-eyebrow"></p>
            <h2 id="browse-title"></h2>
          </div>
        </div>
        <div class="playlist-list" id="playlist-list"></div>
      </section>

      <nav class="tabbar" aria-label="Primary">
        <span class="active">♫<small id="tab-music"></small></span>
      </nav>

      <footer class="legal">
        <span id="youtube-disclosure"></span>
        <a href="https://www.youtube.com/t/terms" target="_blank" rel="noopener">YouTube Terms</a>
        <span>·</span>
        <a href="https://policies.google.com/privacy" target="_blank" rel="noopener">Google Privacy</a>
      </footer>
    </main>
  </div>

  <dialog class="assistant-dialog" id="assistant-dialog" aria-labelledby="assistant-title">
    <div class="dialog-sheet">
      <div class="dialog-handle" aria-hidden="true"></div>
      <div class="dialog-header">
        <button class="dialog-icon" id="assistant-back" type="button" aria-label="Back" hidden>‹</button>
        <span class="step-label" id="assistant-step"></span>
        <button class="dialog-icon" id="assistant-close" type="button" aria-label="Close">×</button>
      </div>
      <h2 id="assistant-title"></h2>
      <p id="assistant-subtitle"></p>
      <div class="assistant-options" id="assistant-options"></div>
    </div>
  </dialog>

  <p class="sr-only" id="announcement" aria-live="assertive"></p>
  <script type="module" src="./src/app.mjs"></script>
</body>
</html>
